name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Run clippy
      run: cargo clippy -- -D warnings
    - name: Run fmt
      run: cargo fmt -- --check
    - name: Run tests
      run: cargo test --verbose
